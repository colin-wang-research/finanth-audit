name: public-artifact-ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install build tooling
        run: python -m pip install --upgrade "pip>=23" "setuptools>=68" wheel
      - name: Install public artifact
        run: python -m pip install ".[test]"
      - name: Compile Python sources
        run: python -m compileall -q .
      - name: Run public release tests
        run: python -m pytest -q release_tests
