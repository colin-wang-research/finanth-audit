tl_dr: >-
  FinAuth-Audit shows that low negative-utility rates do not establish valid
  authorization when coverage, lineage, transfer, and evidence sufficiency are
  audited jointly.
abstract: >-
  Financial agents turn weak priors into actions, but outcome loss, policy
  violation, and execution authority are distinct. FinAuth-Audit benchmarks
  whether comparisons among execution rules remain valid when coverage,
  provenance, consequence severity, review workload, utility, and point-in-time
  evidence are audited jointly. We benchmark execution rules, not predictors.
  The release contains 124,000 controlled, provenance, and mechanistic event
  clusters, public event and order-book layers, and a preregistered 300-date
  actual-model partition. Four findings define the benchmark. First, the lowest
  negative-utility authorization rate (NUAR; the frozen artifact field is
  retained as legacy FAR) is 0.064 but coexists with ALR 0.245, while
  lineage-clean rules occupy different coverage, utility, and review frontiers.
  Second, a clean current role retains 0.172 indirect laundering, and partial
  lineage signatures leave a nonzero finite-sample information cost. Third, a
  200-date actual-model test does not reproduce a 60-date pilot inversion and
  shows that economic loss, material harm, and authority violation rank
  operating points differently. Fourth, predeclared validity gates retain a
  powered mixed Binance result, an underpowered event-market layer, and
  coverage-collapsed learner comparisons rather than promoting partial
  evidence. FinAuth-Audit is a release protocol, not a trading strategy or
  deployment claim.
